<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P03 韻母查詢系統</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
</head>
<body>
  <div class="container">
    <header class="hero">
      <div class="hero-top">
        <div>
          <h1>P03 韻母查詢系統</h1>
          <p>輸入詞語後，系統會取最後一個字查找韻母，依權重、字數、聲調優先規則列出同韻詞，並可直接加入精選。</p>
        </div>
        <a class="page-link" href="featured.html">精選</a>
      </div>
    </header>

    <section class="card search-card">
      <form id="searchForm" autocomplete="off">
        <label for="termInput">輸入詞語</label>
        <div class="search-row">
          <input id="termInput" type="text" maxlength="50" placeholder="例如：安靜、伯牙、佈告" required />
          <button type="submit" id="searchBtn">查詢</button>
        </div>
      </form>

      <div class="random-bar">
        <button type="button" class="random-btn" data-length="1">一字：載入中…</button>
        <button type="button" class="random-btn" data-length="2">二字：載入中…</button>
        <button type="button" class="random-btn" data-length="3">三字：載入中…</button>
        <button type="button" class="random-btn" data-length="4">四字：載入中…</button>
        <button type="button" id="refreshRandomBtn" class="ghost-btn">換一批</button>
      </div>

      <div id="searchInfo" class="search-info"></div>
      <div id="message" class="message"></div>
    </section>

    <section class="card result-card">
      <div class="result-head">
        <h2>查詢結果</h2>
        <div id="stats" class="stats"></div>
      </div>

      <div id="results" class="results"></div>
      <div id="loading" class="loading hidden">載入中…</div>
      <div id="endMessage" class="end-message hidden">已載入全部資料</div>
      <div id="sentinel" class="sentinel"></div>
    </section>
  </div>

  <template id="resultItemTemplate">
    <article class="result-item">
      <div class="term"></div>
      <div class="meta-row">
        <div class="meta"></div>
        <button type="button" class="select-btn">選</button>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
