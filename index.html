<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P03V2 韻母查詢系統</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
</head>
<body>
  <div class="container">
    <header class="hero">
      <h1>P03V2 韻母查詢系統</h1>
      <p>輸入一個詞，系統會取最後一個字，到資料表 <code>TblP03LexiconRhyme</code> 查詢其韻母，並列出同韻母詞彙。</p>
    </header>

    <section class="card search-card">
      <form id="searchForm" autocomplete="off">
        <label for="termInput">輸入詞語</label>
        <div class="search-row">
          <input id="termInput" type="text" maxlength="20" placeholder="例如：安靜、伯牙、佈告" required />
          <button type="submit" id="searchBtn">查詢</button>
        </div>
      </form>

      <div id="searchInfo" class="search-info"></div>
      <div id="message" class="message"></div>
    </section>

    <section class="card result-card">
      <div class="result-head">
        <h2>查詢結果</h2>
        <div id="stats" class="stats"></div>
      </div>

      <div id="results" class="results"></div>
      <div id="loading" class="loading hidden">載入中…</div>
      <div id="endMessage" class="end-message hidden">已載入全部資料</div>
      <div id="sentinel" class="sentinel"></div>
    </section>
  </div>

  <template id="resultItemTemplate">
    <article class="result-item">
      <div class="term"></div>
      <div class="meta"></div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
